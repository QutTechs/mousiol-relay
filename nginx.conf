# =============================================================================
# nginx.conf - Google Cloud Run relay for Xray/3x-ui WebSocket and XHTTP
# =============================================================================

# 1 vCPU per instance by default; bump only if you also bump Cloud Run CPUs.
worker_processes      1;

# /run is read-only on Cloud Run; /tmp is the only guaranteed-writable path.
pid                   /tmp/nginx.pid;

# Surface startup/runtime errors to Cloud Logging.
error_log             /dev/stderr warn;

events {
    # 1000 downstream + 1000 upstream sockets + headroom. 16384 was wasted RAM.
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;

    # Buffered access log to stdout. Set to `off` if you don't need it —    
    # the GFE already logs every request in Cloud Run's request log.
    access_log      /dev/stdout combined buffer=32k flush=1s;

    # ---------- timeouts ----------
    # Cloud Run hard-caps a request at 3600s. Larger values are silently
    # truncated by the front end.
    proxy_connect_timeout   10s;
    proxy_send_timeout      3600s;
    proxy_read_timeout      3600s;
    client_body_timeout     3600s;
    send_timeout            3600s;

    # Short client keepalive so sockets drain quickly when Cloud Run
    # decides to scale this instance down. GFE itself idles at ~600s.
    keepalive_timeout       75s;
    keepalive_requests      1000;

    # ---------- proxy defaults ----------
    proxy_http_version       1.1;
    proxy_buffering          off;   # required for live WS frames
    proxy_request_buffering  off;   # don't spool client bodies
    proxy_cache              off;
    proxy_buffer_size        8k;
    proxy_buffers            8 8k;

    # ---------- maps ----------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------- DNS ----------
    # Required because proxy_pass below uses a variable. This makes nginx
    # resolve the origin hostname at request time instead of pinning one IP
    # for the lifetime of the worker.
    resolver         8.8.8.8 8.8.4.4 ipv6=off valid=30s;
    resolver_timeout 5s;

    # ---------- server ----------
    server {
        # Cloud Run injects $PORT (default 8080). Non-root cannot bind <1024.
        listen      8080 default_server;
        server_name _;

        # Cloud Run hard-limits request bodies to 32 MiB; mirror it so
        # nginx rejects oversized uploads instead of buffering them.
        client_max_body_size       32m;
        client_body_buffer_size    16k;
        client_header_buffer_size  4k;
        large_client_header_buffers 4 8k;

        location = / {
            return 204;
        }

        location = /gaccess {
            set $origin_host xray.exynos1.eu.cc;
            set $origin_port 8585;

            proxy_pass http://$origin_host:$origin_port;

            # WebSocket upgrade (hop-by-hop)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Forward client identity. Cloud Run's GFE already populates
            # X-Forwarded-For / X-Forwarded-Proto upstream of us, so
            # $proxy_add_x_forwarded_for appends, it doesn't overwrite.
            proxy_set_header Host              $origin_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /xaccess {
            set $origin_host xray.exynos1.eu.cc;
            set $origin_port 2099;

            proxy_pass http://$origin_host:$origin_port;

            # XHTTP is plain HTTP proxying, not WebSocket upgrade.
            proxy_set_header Connection "";

            proxy_set_header Host              $origin_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /xaccess/ {
            set $origin_host xray.exynos1.eu.cc;
            set $origin_port 2099;

            proxy_pass http://$origin_host:$origin_port;

            # XHTTP appends session-specific path segments under /xaccess/.
            proxy_set_header Connection "";

            proxy_set_header Host              $origin_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
